openapi: 3.0.3
info:
  title: SDET Retail Automation Lab API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
  /api/debug/cart-total:
    get:
      summary: Delayed cart total for Day 5 debugging labs
      parameters:
        - in: query
          name: delay
          schema:
            type: integer
          description: Artificial response delay in milliseconds, capped by the service.
      responses:
        "200":
          description: Debug cart total summary
  /api/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login succeeded
        "401":
          description: Invalid credentials
        "423":
          description: Account locked
  /api/products:
    get:
      summary: List products
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Product list
  /api/products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
        "404":
          description: Product not found
  /api/cart/items:
    post:
      summary: Add cart item
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Cart item added
  /api/cart/items/{id}:
    put:
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart item updated
        "404":
          description: Cart item not found
    delete:
      summary: Delete cart item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cart item deleted
        "404":
          description: Cart item not found
  /api/cart:
    get:
      summary: Get cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart state
  /api/orders:
    get:
      summary: List orders for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user's orders
    post:
      summary: Create order
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Order created
  /api/orders/{id}:
    get:
      summary: Get order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
  /api/admin/orders:
    get:
      summary: List orders for admin review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin order list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
