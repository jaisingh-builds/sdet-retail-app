openapi: 3.0.3
info:
  title: SDET Retail Automation Lab API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
  /api/debug/cart-total:
    get:
      summary: Delayed cart total for Day 5 debugging labs
      parameters:
        - in: query
          name: delay
          schema:
            type: integer
          description: Artificial response delay in milliseconds, capped by the service.
      responses:
        "200":
          description: Debug cart total summary
  /api/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login succeeded
        "401":
          description: Invalid credentials
        "423":
          description: Account locked
  /api/products:
    get:
      summary: List products
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
      responses:
        "200":
          description: Product list
  /api/products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
        "404":
          description: Product not found
  /api/legacy/products/{id}.xml:
    get:
      summary: Legacy XML product detail for Week 2 Day 2 XmlPath labs
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail as XML
          content:
            application/xml:
              schema:
                type: string
        "404":
          description: Product not found as XML
  /api/cart/items:
    post:
      summary: Add cart item
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Existing matching cart item quantity updated
        "201":
          description: Cart item added
        "400":
          description: Invalid quantity
        "409":
          description: Stock or quantity limit conflict
  /api/cart/items/{id}:
    put:
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cart item updated
        "400":
          description: Invalid quantity
        "404":
          description: Cart item not found
        "409":
          description: Stock or quantity limit conflict
    delete:
      summary: Delete cart item
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cart item deleted
        "404":
          description: Cart item not found
  /api/cart:
    get:
      summary: Get cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart state
    delete:
      summary: Clear cart
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Cart cleared
  /api/orders:
    get:
      summary: List orders for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user's orders
    post:
      summary: Create order
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Order created
          headers:
            Location:
              schema:
                type: string
              description: URL of the created order
        "400":
          description: Empty cart or invalid totals
  /api/orders/{id}:
    get:
      summary: Get order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
  /api/admin/orders:
    get:
      summary: List orders for admin review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin order list
  /api/oauth/token:
    post:
      summary: Create an OAuth-style access token for Week 2 authentication labs
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id, client_secret]
              properties:
                grant_type:
                  type: string
                  example: client_credentials
                client_id:
                  type: string
                  example: retail-test-client
                client_secret:
                  type: string
                  format: password
      responses:
        "200":
          description: Access token created
        "400":
          description: Unsupported grant type
        "401":
          description: Invalid client credentials
  /api/secure/orders:
    post:
      summary: Create an order using an OAuth access token
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, total]
              properties:
                items:
                  type: array
                  items:
                    type: object
                total:
                  type: number
                  format: double
                userId:
                  type: integer
      responses:
        "201":
          description: Order created and persisted
        "401":
          description: Missing or invalid access token
        "403":
          description: Token does not contain the required scope
  /api/secure/orders/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Get a secure order by ID
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Order detail
        "401":
          description: Missing or invalid access token
        "404":
          description: Order not found
    delete:
      summary: Delete a secure order after a database validation test
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Order deleted
        "401":
          description: Missing or invalid access token
        "404":
          description: Order not found
  /api/partner/orders/{id}:
    get:
      summary: Get an order using a partner API key
      security:
        - apiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner order detail
        "401":
          description: Missing API key
        "403":
          description: Invalid API key
        "404":
          description: Order not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
